<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="#16a34a"/>

  <!-- Sun -->
  <circle cx="128" cy="66" r="26" fill="#fbbf24"/>
  <g stroke="#fbbf24" stroke-width="8" stroke-linecap="round">
    <line x1="128" y1="26" x2="128" y2="16"/>
    <line x1="154" y1="34" x2="161" y2="26"/>
    <line x1="170" y1="57" x2="180" y2="51"/>
    <line x1="173" y1="83" x2="184" y2="83"/>
    <line x1="102" y1="34" x2="95"  y2="26"/>
    <line x1="86"  y1="57" x2="76"  y2="51"/>
    <line x1="83"  y1="83" x2="72"  y2="83"/>
  </g>

  <!-- Car body (side view) -->
  <rect x="36" y="154" width="184" height="44" rx="10" fill="white"/>
  <!-- Front/rear bumpers -->
  <rect x="24"  y="168" width="14" height="18" rx="4" fill="white"/>
  <rect x="218" y="168" width="14" height="18" rx="4" fill="white"/>
  <!-- Cabin -->
  <path d="M74,154 C80,126 104,114 128,112 C152,114 176,126 182,154 Z" fill="white"/>
  <!-- Windshield tint -->
  <path d="M86,154 C91,132 109,122 128,120 C147,122 165,132 170,154 Z" fill="#bbf7d0"/>

  <!-- Wheels -->
  <circle cx="88"  cy="198" r="24" fill="#1e293b"/>
  <circle cx="88"  cy="198" r="11" fill="#475569"/>
  <circle cx="168" cy="198" r="24" fill="#1e293b"/>
  <circle cx="168" cy="198" r="11" fill="#475569"/>

  <!-- Lightning bolt (charging symbol) -->
  <path d="M144,116 L122,158 L138,158 L116,198 L162,150 L144,150 Z"
        fill="#fbbf24" stroke="#d97706" stroke-width="2" stroke-linejoin="round"/>
</svg>
